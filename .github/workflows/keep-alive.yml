name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://career-predictor-cnvg.onrender.com/auth/me)
          echo "Response status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "Service is healthy"
          else
            echo "Warning: Unexpected status code $STATUS"
          fi
